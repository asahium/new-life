# ============================================
# agterm - keymap config
# ============================================
# File: ~/.config/agterm/keymap.conf
# Reload: File > Reload Keymap, palette (Ctrl+Shift+P > "Reload Keymap"),
#         or `agtermctl keymap reload`.
#
# Two verbs:
#   map <chord> <built_in_action>      rebind a built-in (single chord only)
#   command "Name" [<chord>] <shell>   custom shell command (chord optional)
#
# Chord = mods joined by '+' and a base key, e.g. cmd+shift+e, ctrl+`.
# Mods: ctrl cmd opt shift. Base: a single char or tab/space/return/delete.
# Custom-command chords may be leader sequences: ctrl+a>g (press ctrl+a, then g).
# A custom command's chord MUST include a modifier; no-chord = palette-only.
#
# Tokens expanded in custom commands (also exported as $AGT_X env vars):
#   {AGT_SESSION_ID} {AGT_SESSION_NAME} {AGT_SESSION_PWD}
#   {AGT_WORKSPACE_ID} {AGT_WORKSPACE_NAME}
#   {AGT_WINDOW_ID} {AGT_WINDOW_NAME} {AGT_SELECTION} {AGT_SOCKET}
# Prefer quoted "$AGT_X" env vars over raw {AGT_X} for untrusted content.

# --- Built-in rebinds (SAND-style, mirrors the Ghostty config) ---
# S - Split
map cmd+d          toggle_split
# J - Scratch overlay
map cmd+j          toggle_scratch
# Search inside the focused terminal
map cmd+f          toggle_search
# Navigate between panes
map cmd+opt+left   focus_left_pane
map cmd+opt+right  focus_right_pane
# Sessions / palettes
map ctrl+p         session_palette
map ctrl+shift+p   command_palette

# --- Custom commands (open in palette + bound to a chord) ---
command "Lazygit"          ctrl+a>g     lazygit
command "Open in Cursor"   cmd+shift+e  open -a Cursor "$AGT_SESSION_PWD"
command "Open in Zed"      cmd+shift+z  open -a Zed "$AGT_SESSION_PWD"
command "File manager"     ctrl+a>n     nnn "$AGT_SESSION_PWD"
command "btop"             ctrl+a>t     btop

# Palette-only helpers (no chord)
command "Reveal in Finder"              open "$AGT_SESSION_PWD"
command "Edit nvim config"              nvim ~/.config/nvim/init.lua
