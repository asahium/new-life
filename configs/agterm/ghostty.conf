# ============================================
# agterm - Ghostty config (agterm-scoped)
# ============================================
# File: ~/.config/agterm/ghostty.conf
# Always loaded by agterm, never read by standalone Ghostty.app.
# Override order: ghostty defaults -> ~/.config/ghostty/config (if enabled)
#                 -> this file -> agterm Settings (UI wins for font/theme/opacity).
#
# Font, theme, background opacity/blur and scroll speed are managed in
# agterm Settings (Cmd+,) and will win over this file — set those there.
# Put everything else here.
# Full key reference: ghostty +show-config --default --docs

# Make the macOS Option key send Alt (useful for many TUIs / readline).
macos-option-as-alt = true

# Treat the standalone Ghostty config keys for cursor/mouse consistently.
cursor-style = bar
cursor-style-blink = true
mouse-hide-while-typing = true
copy-on-select = clipboard

# Large scrollback for long-running agent sessions.
scrollback-limit = 25000000

# Bracketed paste protection (safer when pasting into agents/shells).
clipboard-paste-protection = true
clipboard-paste-bracketed-safe = true
